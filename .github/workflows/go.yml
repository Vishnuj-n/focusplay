name: Focusplay Build

on:
  push:
    tags:
      - '*'

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact_name: focusplay-linux-amd64

          - os: windows-latest
            platform: windows/amd64
            artifact_name: focusplay-windows-amd64

          - os: macos-latest
            platform: darwin/universal
            artifact_name: focusplay-macos-universal

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libglib2.0-dev \
            libasound2-dev \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build application
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Show generated files (Linux/macOS)
        if: runner.os != 'Windows'
        run: ls -R build/bin

      - name: Show generated files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem -Recurse build/bin

      # macOS: zip the .app bundle (directories can't be uploaded directly)
      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          for app in *.app; do
            zip -r "${app%.app}.zip" "$app"
          done

      # Upload artifacts per OS (avoids multiline matrix glob issues)
      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/focusplay

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/*.exe

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/bin/*.zip
            build/bin/*.dmg

      # Release uploads — only generate notes once (Linux job)
      - name: Upload release assets (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: build/bin/focusplay

      - name: Upload release assets (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          files: build/bin/*.exe

      - name: Upload release assets (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          files: |
            build/bin/*.zip
            build/bin/*.dmg