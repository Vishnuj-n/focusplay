name: Release FocusPlay

on:
  push:
    tags:
      - 'v*' # Triggers workflow when you push a tag like v1.0.0

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Linux requires specific system dependencies to compile Wails apps
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows
        if: runner.os == 'Windows'
        run: wails build --nsis

      - name: Build macOS
        if: runner.os == 'macOS'
        run: wails build --platform darwin/universal

      - name: Build Linux
        if: runner.os == 'Linux'
        run: wails build --platform linux/amd64

      # Prepare and Zip files for clean distribution
      - name: Prepare Assets (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r focusplay-macos-universal.zip focusplay.app

      - name: Prepare Assets (Linux)
        if: runner.os == 'Linux'
        run: mv build/bin/focusplay build/bin/focusplay-linux-amd64

      # Attach the compiled binaries to the GitHub Release
      - name: Upload Windows Asset
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/*installer.exe

      - name: Upload macOS Asset
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/focusplay-macos-universal.zip

      - name: Upload Linux Asset
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/focusplay-linux-amd64